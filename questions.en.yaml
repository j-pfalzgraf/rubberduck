# rubberduck – question pool (English)
#
# Edit this file freely: add topics or questions; your team can share it.
#
# Format: `topics` maps a topic name to a topic. Each topic may use one of two
# shapes:
#   lean:                    rich:
#     - "Question 1"           description: "Short text for the picker"
#     - "Question 2"           questions:
#                               - "Question 1"
#
# The default topic is `default`. Reach custom topics via `--topic <name>`.

topics:
  default:
    description: "General questions for (almost) any bug."
    questions:
      - "What is your code actually supposed to do at this point?"
      - "What happens instead — concretely?"
      - "How exactly do you notice something is wrong (error message, wrong value, crash)?"
      - "Which line or function is the prime suspect — and why that one?"
      - "Which assumption are you making here that might not hold?"
      - "What did you change last, right before the bug appeared?"
      - "With which inputs does it go wrong — and with which does it work?"
      - "If you print the value in question just before that spot: what do you expect, what do you see?"
      - "Which part of the problem could you isolate or make smaller?"
      - "What is the simplest thing you could try next?"

  logic:
    description: "Logic, loop and condition bugs."
    questions:
      - "Are your conditions really correct (==, <, >, parentheses, negations)?"
      - "Is there an off-by-one error at the boundaries (< vs <=, index 0 vs 1)?"
      - "Which edge cases haven't you considered yet (empty, null, negative, very large)?"
      - "Does the loop run as often as you think — one too many or one too few?"
      - "Is the order of steps right, or does something happen too early or too late?"
      - "Is a variable being overwritten, or does it secretly keep an old value?"
      - "If you work the case through by hand on paper: where does the program first diverge?"

  perf:
    description: "Slow code: runtime, memory, I/O."
    questions:
      - "What exactly is slow — and how do you know (measurement or gut feeling)?"
      - "Did you measure the slow part, or only assume it?"
      - "Which operation runs most often — is there a loop inside a loop hiding there?"
      - "Is something computed repeatedly that you could compute once and remember?"
      - "How does the runtime grow when the input doubles?"
      - "Is it CPU time, memory, I/O, or the network?"
      - "Does your data structure fit the access pattern (lookup, insert, ordering)?"

  api:
    description: "APIs, calls and interfaces."
    questions:
      - "What does the documentation say this call returns — and what does it actually do?"
      - "Are the order, types and units of the arguments correct?"
      - "Which status code or error response do you get exactly?"
      - "Do you handle the error case of the response, or only the success case?"
      - "Are authentication, headers and content type correct?"
      - "Is it your request, or the other side's response?"
      - "What does a direct test (curl/Postman) show compared to your code?"

  build:
    description: "Build and compile errors."
    questions:
      - "What exactly does the first error say — not the cascade of errors after it?"
      - "Which file and line does the compiler point to — does that match where you suspect the problem?"
      - "Did you run a clean build, or could this be a stale cache or an old artifact?"
      - "Are all dependencies present at the versions the project expects?"
      - "Did it build before? What changed — a dependency, a flag, the toolchain?"
      - "Is it a syntax error, a type error, or a linker/missing-symbol error? Each has a different cause."
      - "Can you reproduce it with the smallest possible file or target?"

  concurrency:
    description: "Threads, async, races and deadlocks."
    questions:
      - "Which data is shared between threads or tasks — and what actually guards it?"
      - "Could two things run at the same time that you assumed run in order?"
      - "Does the bug vanish when you add a delay or run single-threaded? That points at a race."
      - "Who locks what, in which order — could two locks be taken in opposite orders (deadlock)?"
      - "Are you awaiting or joining everything, or could a task be dropped or left unfinished?"
      - "Is the state you read actually published yet, or could you be seeing a stale value?"
      - "Is it reproducible, or only under load? Intermittent usually means timing."

  memory:
    description: "Crashes, leaks and corruption."
    questions:
      - "What kind of failure is it — a crash, a leak, or wrong data (use-after-free, overflow)?"
      - "Which exact access blows up — an index, a pointer, an unwrap on something empty?"
      - "Is the buffer big enough for every case, including the boundary and the empty one?"
      - "Does something get freed or go out of scope while it is still used elsewhere?"
      - "Does the leak grow with one specific action — can you isolate the allocation that is never released?"
      - "What do a sanitizer or a debugger say about the faulting address?"
      - "Are ownership and lifetimes clear, or is it ambiguous who frees what and when?"

  network:
    description: "HTTP, sockets, timeouts and DNS."
    questions:
      - "Does the request even leave your machine — what does a packet or HTTP trace show?"
      - "Is it DNS, the connection, TLS, or the response itself that fails?"
      - "Which status code, timeout, or connection error do you get exactly?"
      - "Are the URL, port, headers and timeouts what you actually intend?"
      - "Does it work from curl or another client but not your code — or the other way round?"
      - "Could it be flaky: retries, rate limits, or a slow and overloaded server?"
      - "Do you handle partial reads, timeouts and disconnects, not just the happy path?"
