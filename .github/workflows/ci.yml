# CI: formatting, lints, docs, cross-platform tests, MSRV, a CLI smoke test and
# shellcheck. Uses the native-tls default build (the path `cargo install` takes).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: fmt + clippy + docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install OpenSSL headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Docs (deny warnings)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --locked

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install OpenSSL headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Test
        run: cargo test --locked

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2
      - name: Install OpenSSL headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Check on the declared MSRV
        run: cargo check --locked --all-targets

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # shellcheck is preinstalled on ubuntu runners.
      - name: ShellCheck install scripts
        run: shellcheck install.sh uninstall.sh

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Lint the workflow files themselves (syntax, expressions, action inputs).
      # actionlint also runs shellcheck over every `run:` block, so the inline
      # bash here is held to the same standard as the install scripts above.
      - name: Install actionlint
        run: |
          set -euo pipefail
          version=1.7.7
          base="https://github.com/rhysd/actionlint/releases/download/v${version}"
          asset="actionlint_${version}_linux_amd64.tar.gz"
          # Download the asset and its published checksums, then verify before
          # extracting — the only CI binary fetched outside a pinned action.
          curl -fsSL -o "$asset" "${base}/${asset}"
          curl -fsSL -o checksums.txt "${base}/actionlint_${version}_checksums.txt"
          sha256sum --ignore-missing -c checksums.txt
          tar -xzf "$asset" actionlint
      - name: Lint workflows
        run: ./actionlint -color

  smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install OpenSSL headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Build
        run: cargo build --locked
      - name: Exercise the CLI end to end
        env:
          RUBBERDUCK_CONFIG_DIR: ${{ runner.temp }}/cfg
          RUBBERDUCK_DATA_DIR: ${{ runner.temp }}/data
          NO_COLOR: "1"
        run: |
          set -euo pipefail
          bin=target/debug/rubberduck
          # `grep PATTERN >/dev/null` (no -q) reads to EOF, so it never closes the
          # pipe early on the producer.
          "$bin" --version
          "$bin" --help >/dev/null
          "$bin" topics | grep "Available topics" >/dev/null
          "$bin" topics | grep "concurrency" >/dev/null
          "$bin" topics --lang de | grep "Verfügbare Themen" >/dev/null
          "$bin" languages | grep "English" >/dev/null
          "$bin" languages | grep "Français" >/dev/null
          "$bin" languages | grep "Español" >/dev/null
          "$bin" topics --lang fr | grep "Sujets disponibles" >/dev/null
          "$bin" topics --lang es | grep "Temas disponibles" >/dev/null
          "$bin" themes | grep "dracula" >/dev/null
          "$bin" tips | grep "Debugging tips" >/dev/null
          "$bin" tips --lang es | grep "Consejos" >/dev/null
          "$bin" tip --no-anim --quiet >/dev/null
          "$bin" doctor | grep "8 topics (en)" >/dev/null
          "$bin" completions bash | grep "rubberduck" >/dev/null
          "$bin" man | grep "rubberduck" >/dev/null
          "$bin" stats --json | grep '"sessions"' >/dev/null
          "$bin" history --json | grep '"total"' >/dev/null
          "$bin" config set theme dracula
          "$bin" config show | grep "theme: dracula" >/dev/null
          "$bin" config set language es
          "$bin" config show | grep "language: es" >/dev/null
          "$bin" config reset
          "$bin" config show | grep "theme: classic" >/dev/null
          echo "CLI smoke test passed"

  package:
    name: publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install OpenSSL headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      # Packages and builds the crate exactly as `cargo install rubberduck-cli`
      # would, so a missing `include_str!` asset or bad metadata fails CI rather
      # than the first real publish.
      - name: Verify the crate is publishable
        run: cargo publish --dry-run --locked
