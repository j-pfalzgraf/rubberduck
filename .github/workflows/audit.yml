# Security audit: checks dependencies against the RustSec advisory database,
# weekly and whenever the dependency set changes.
name: Audit

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
  schedule:
    - cron: "0 6 * * 1" # Mondays at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # serde_yaml is unmaintained (RUSTSEC-2024-0006) but still functional and
      # explicitly chosen by the spec; ignore that informational advisory so the
      # job only fails on actual vulnerabilities.
      - name: Audit dependencies
        run: cargo audit --ignore RUSTSEC-2024-0006
