# Release workflow for rubberduck.
#
# Triggered by pushing a `vX.Y.Z` tag; builds the release binaries for all 6
# targets from the asset-naming contract, packages them exactly per the contract
# (rubberduck-<TARGET>.tar.gz or .zip), generates a single SHA256SUMS file and
# publishes a GitHub release with all assets.
#
# IMPORTANT: the asset file names MUST be exactly `rubberduck-<TARGET>.(tar.gz|zip)`
# and the checksum file exactly `SHA256SUMS`. The install scripts, CI and the
# built-in `rubberduck self update` all rely on these names.
#
# NOTE (placeholder): this repo assumes owner/repo = "j-pfalzgraf/rubberduck".
# When you fork, you only need to change the repo name (the workflow uses
# ${{ github.repository }} and the pushed tag automatically) – no edits to this
# file are required for that.

name: Release

on:
  push:
    tags:
      - "v*.*.*" # e.g. v1.0.0
  workflow_dispatch: {} # manual runs allowed

# Minimal default; the release job widens this to exactly what it needs.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # -------------------------------------------------------------------------
  # 1) Build matrix: one job per target; packs its archive and uploads it as an
  #    artifact. The release job downloads the artifacts again afterwards.
  # -------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # native-tls needs OpenSSL ONLY on Linux; macOS uses Secure Transport,
          # Windows SChannel. So `vendored-openssl` (for portable binaries +
          # cross-build) is set for Linux only.
          # --- Linux (x86_64): native build, vendored OpenSSL ---
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: false
            features: "--features vendored-openssl"
          # --- Linux (aarch64): cross via gcc-aarch64-linux-gnu, vendored OpenSSL ---
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
            features: "--features vendored-openssl"
          # --- macOS (x86_64): cross on an Apple-Silicon runner, Secure Transport ---
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            cross: false
            features: ""
          # --- macOS (aarch64): native build, Secure Transport ---
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            cross: false
            features: ""
          # --- Windows (x86_64): native build, SChannel ---
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            cross: false
            features: ""
          # --- Windows (aarch64): cross from the x64 runner, SChannel ---
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
            cross: false
            features: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Rust toolchain via rustup; the desired target is added.
      - name: Install Rust toolchain and target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cargo build cache (the key includes the target so each target caches separately).
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Cross C compiler for aarch64 Linux. Needed because
      # `--features vendored-openssl` builds and links OpenSSL from source, which
      # requires an aarch64-capable C compiler.
      - name: Install aarch64 cross toolchain (linux only)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # Cargo env for the aarch64 Linux cross build:
      #  - CARGO_TARGET_..._LINKER: linker for the target binary.
      #  - CC_aarch64_unknown_linux_gnu: C compiler that openssl-src uses to build OpenSSL.
      - name: Configure cross env (linux aarch64)
        if: matrix.cross == true
        shell: bash
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # Release build. `--locked` enforces the committed Cargo.lock. Only the
      # Linux targets set `${{ matrix.features }}` = `--features vendored-openssl`
      # (static OpenSSL); macOS/Windows build without OpenSSL.
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} ${{ matrix.features }}

      # --- Package: Unix -> tar.gz with the `rubberduck` binary at the archive root ---
      - name: Package (unix tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          bindir="target/${{ matrix.target }}/release"
          asset="rubberduck-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C "$bindir" rubberduck
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      # --- Package: Windows -> zip with `rubberduck.exe` at the archive root ---
      - name: Package (windows zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bindir = "target/${{ matrix.target }}/release"
          $asset  = "rubberduck-${{ matrix.target }}.zip"
          Compress-Archive -Path (Join-Path $bindir "rubberduck.exe") -DestinationPath $asset -Force
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Upload the archive as an artifact so the release job can collect it.
      # One artifact per target (name = asset file name).
      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: rubberduck-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error
          retention-days: 7

  # -------------------------------------------------------------------------
  # 2) Release job: downloads all archives, generates ONE SHA256SUMS file over
  #    every archive and creates the GitHub release with all assets.
  # -------------------------------------------------------------------------
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    # Only publish for real tag pushes. On a manual workflow_dispatch from a
    # branch, github.ref_name would be a branch name -> no (accidental) release.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write # create the release / upload assets
      id-token: write # OIDC token for build provenance
      attestations: write # write the provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Collect all build artifacts into ./dist (flat, no per-artifact subdirs).
      - name: Download all archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      # Generate shell completions and a man page from a freshly built binary so
      # they ship as release assets alongside the archives.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install OpenSSL headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Build native binary
        run: cargo build --release --locked
      - name: Generate completions and man page
        run: |
          set -euo pipefail
          bin=target/release/rubberduck
          for sh in bash zsh fish powershell elvish; do
            "$bin" completions "$sh" > "dist/rubberduck.$sh"
          done
          "$bin" man > dist/rubberduck.1

      # One SHA256SUMS over EVERYTHING in dist (archives + completions + man).
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- * > SHA256SUMS
          echo "----- SHA256SUMS -----"
          cat SHA256SUMS

      # Supply-chain provenance (SLSA) for the release archives.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/rubberduck-*.tar.gz
            dist/rubberduck-*.zip

      # Create the release with all assets and auto-generated notes.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/rubberduck-*.tar.gz
            dist/rubberduck-*.zip
            dist/rubberduck.bash
            dist/rubberduck.zsh
            dist/rubberduck.fish
            dist/rubberduck.powershell
            dist/rubberduck.elvish
            dist/rubberduck.1
            dist/SHA256SUMS
