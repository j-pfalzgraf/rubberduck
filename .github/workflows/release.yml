# Release-Workflow für rubberduck.
#
# Triggert beim Pushen eines Tags `vX.Y.Z`, baut die Release-Binaries für alle
# 6 Targets aus dem Asset-Naming-Contract, paketiert sie exakt nach dem Vertrag
# (rubberduck-<TARGET>.tar.gz bzw. .zip), erzeugt eine einzelne SHA256SUMS-Datei
# und veröffentlicht ein GitHub Release mit allen Assets.
#
# WICHTIG: Die Asset-Dateinamen MÜSSEN exakt `rubberduck-<TARGET>.(tar.gz|zip)`
# heißen und die Prüfsummendatei exakt `SHA256SUMS`. Install-Skripte, CI und der
# eingebaute `rubberduck self update` verlassen sich auf diese Namen.
#
# HINWEIS (Platzhalter): Dieses Repo geht von owner/repo = "j-pfalzgraf/rubberduck"
# aus. Wenn ihr forkt, müsst ihr nur den Repo-Namen ändern (der Workflow nutzt
# automatisch ${{ github.repository }} bzw. das gepushte Tag) – an dieser Datei
# sind dafür keine Anpassungen nötig.

name: Release

on:
  push:
    tags:
      - "v*.*.*" # z. B. v0.1.0
  workflow_dispatch: {} # manuelle Ausführung erlaubt

# Minimal default; the release job widens this to exactly what it needs.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # -------------------------------------------------------------------------
  # 1) Build-Matrix: ein Job pro Target, packt sein Archiv und lädt es als
  #    Artifact hoch. Der Release-Job zieht die Artifacts danach wieder herunter.
  # -------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # native-tls braucht OpenSSL NUR unter Linux; macOS nutzt Secure
          # Transport, Windows SChannel. Daher wird `vendored-openssl` (für
          # portable Binaries + Cross-Build) ausschließlich für Linux gesetzt.
          # --- Linux (x86_64): nativer Build, vendored OpenSSL ---
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: false
            features: "--features vendored-openssl"
          # --- Linux (aarch64): Cross via gcc-aarch64-linux-gnu, vendored OpenSSL ---
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
            features: "--features vendored-openssl"
          # --- macOS (x86_64): Cross auf Apple-Silicon-Runner, Secure Transport ---
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            cross: false
            features: ""
          # --- macOS (aarch64): nativer Build, Secure Transport ---
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            cross: false
            features: ""
          # --- Windows (x86_64): nativer Build, SChannel ---
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            cross: false
            features: ""
          # --- Windows (aarch64): Cross vom x64-Runner, SChannel ---
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
            cross: false
            features: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Rust-Toolchain via rustup; das gewünschte Target wird hinzugefügt.
      - name: Install Rust toolchain and target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cargo-Build-Cache (key enthält das Target, damit pro Target getrennt gecacht wird).
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Cross-C-Compiler für aarch64-Linux. Wird gebraucht, weil
      # `--features vendored-openssl` OpenSSL aus dem Quellcode baut und linkt;
      # dafür ist ein aarch64-tauglicher C-Compiler nötig.
      - name: Install aarch64 cross toolchain (linux only)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # Cargo-Env für den aarch64-Linux-Cross-Build:
      #  - CARGO_TARGET_..._LINKER: Linker für das Target-Binary.
      #  - CC_aarch64_unknown_linux_gnu: C-Compiler, den openssl-src zum Bauen von OpenSSL nutzt.
      - name: Configure cross env (linux aarch64)
        if: matrix.cross == true
        shell: bash
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # Release-Build. `--locked` erzwingt das committete Cargo.lock. Nur die
      # Linux-Targets setzen `${{ matrix.features }}` = `--features vendored-openssl`
      # (statisches OpenSSL); macOS/Windows bauen ohne OpenSSL.
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} ${{ matrix.features }}

      # --- Paketieren: Unix -> tar.gz mit Binär `rubberduck` im Archiv-Root ---
      - name: Package (unix tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          bindir="target/${{ matrix.target }}/release"
          asset="rubberduck-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C "$bindir" rubberduck
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      # --- Paketieren: Windows -> zip mit `rubberduck.exe` im Archiv-Root ---
      - name: Package (windows zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bindir = "target/${{ matrix.target }}/release"
          $asset  = "rubberduck-${{ matrix.target }}.zip"
          Compress-Archive -Path (Join-Path $bindir "rubberduck.exe") -DestinationPath $asset -Force
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Archiv als Artifact hochladen, damit der Release-Job es einsammeln kann.
      # Ein Artifact pro Target (Name = Asset-Dateiname).
      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: rubberduck-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error
          retention-days: 7

  # -------------------------------------------------------------------------
  # 2) Release-Job: lädt alle Archive herunter, erzeugt EINE SHA256SUMS-Datei
  #    über alle Archive und erstellt das GitHub Release mit allen Assets.
  # -------------------------------------------------------------------------
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    # Nur für echte Tag-Pushes veröffentlichen. Bei manuellem workflow_dispatch von
    # einem Branch wäre github.ref_name ein Branchname -> kein (Fehl-)Release.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write # create the release / upload assets
      id-token: write # OIDC token for build provenance
      attestations: write # write the provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Collect all build artifacts into ./dist (flat, no per-artifact subdirs).
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Generate shell completions and a man page from a freshly built binary so
      # they ship as release assets alongside the archives.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install OpenSSL headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Build native binary
        run: cargo build --release --locked
      - name: Generate completions and man page
        run: |
          set -euo pipefail
          bin=target/release/rubberduck
          for sh in bash zsh fish powershell elvish; do
            "$bin" completions "$sh" > "dist/rubberduck.$sh"
          done
          "$bin" man > dist/rubberduck.1

      # One SHA256SUMS over EVERYTHING in dist (archives + completions + man).
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS
          echo "----- SHA256SUMS -----"
          cat SHA256SUMS

      # Supply-chain provenance (SLSA) for the release archives.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/rubberduck-*.tar.gz
            dist/rubberduck-*.zip

      # Create the release with all assets and auto-generated notes.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/rubberduck-*.tar.gz
            dist/rubberduck-*.zip
            dist/rubberduck.bash
            dist/rubberduck.zsh
            dist/rubberduck.fish
            dist/rubberduck.powershell
            dist/rubberduck.elvish
            dist/rubberduck.1
            dist/SHA256SUMS
